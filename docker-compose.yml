services:
  mysql:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      - MYSQL_ROOT_PASSWORD
      - MYSQL_DATABASE
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p$$MYSQL_ROOT_PASSWORD"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "127.0.0.1:3306:3306"
    networks:
      - fujiwara-backend

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    env_file:
      - .env
    ports:
      - "5174:5174"
    networks:
      - fujiwara-backend
      - fujiwara-app

  frontend:
    build:
      context: ./frontend
      args:
        - VITE_API_URL
        - VITE_RECAPTCHA_SITE_KEY
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "5173:80"
    networks:
      - fujiwara-app
      - fujiwara-public

networks:
  fujiwara-public:
    external: true
  fujiwara-app:
    external: true
  fujiwara-backend:
    external: true

volumes:
  mysql_data:
